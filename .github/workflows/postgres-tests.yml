name: PostgreSQL Tests

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: [master]
    paths:
      - 'purplex/**/*.py'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/postgres-tests.yml'
  pull_request:
    branches: [master]
    paths:
      - 'purplex/**/*.py'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/postgres-tests.yml'

jobs:
  test-postgres:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: purplex_test
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: purplex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-django pytest-cov pytest-xdist pytest-timeout

      - name: Set up test environment
        env:
          DATABASE_URL: postgresql://purplex_test:testpass@localhost:5432/purplex_test
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
          DJANGO_SETTINGS_MODULE: purplex.settings
          PURPLEX_ENV: development
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          USE_MOCK_OPENAI: true
        run: |
          echo "Creating test database schema..."
          python manage.py migrate

      - name: Create test data
        env:
          DATABASE_URL: postgresql://purplex_test:testpass@localhost:5432/purplex_test
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
          DJANGO_SETTINGS_MODULE: purplex.settings
          PURPLEX_ENV: development
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          USE_MOCK_OPENAI: true
        run: |
          echo "Creating test data..."
          python manage.py populate_comprehensive || echo "Sample data creation skipped"

      - name: Run tests
        env:
          DATABASE_URL: postgresql://purplex_test:testpass@localhost:5432/purplex_test
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
          DJANGO_SETTINGS_MODULE: purplex.settings
          PURPLEX_ENV: development
          USE_MOCK_FIREBASE: true
          USE_MOCK_OPENAI: true
          DISABLE_FILE_LOGGING: true
        run: |
          echo "Running tests..."
          pytest tests/ -v --tb=short --timeout=60 \
            -k "not slow and not test_returns_false_on_firebase_error and not test_consent_immutability and not test_repository_pattern and not test_create_update_methods_are_simple and not test_services_use_repositories and not test_serializers_do_not_use_orm"

      - name: Check database integrity
        env:
          DATABASE_URL: postgresql://purplex_test:testpass@localhost:5432/purplex_test
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
          DJANGO_SETTINGS_MODULE: purplex.settings
          PURPLEX_ENV: development
        run: |
          python manage.py check --database default

      - name: Database statistics
        run: |
          PGPASSWORD=testpass psql -h localhost -U purplex_test -d purplex_test -c "
            SELECT
              schemaname,
              tablename,
              pg_size_pretty(pg_total_relation_size(schemaname||'.'||tablename)) AS size,
              n_live_tup AS row_count
            FROM pg_stat_user_tables
            ORDER BY pg_total_relation_size(schemaname||'.'||tablename) DESC
            LIMIT 10;
          " || echo "Table statistics query failed, trying alternative..."

          # Alternative simpler query if the above fails
          PGPASSWORD=testpass psql -h localhost -U purplex_test -d purplex_test -c "
            SELECT
              tablename,
              n_live_tup AS row_count
            FROM pg_stat_user_tables
            ORDER BY n_live_tup DESC
            LIMIT 10;
          " || echo "Statistics not available"

      - name: Generate coverage report
        if: always()
        continue-on-error: true
        run: |
          pytest --cov=purplex --cov-report=xml --cov-report=html || echo "Coverage generation skipped"

      - name: Upload coverage to Codecov
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: postgres-tests
          name: postgres-tests
          fail_ci_if_error: false

  load-test:
    runs-on: ubuntu-latest
    needs: test-postgres

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: purplex_test
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: purplex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Setup database
        env:
          DATABASE_URL: postgresql://purplex_test:testpass@localhost:5432/purplex_test
          DJANGO_SECRET_KEY: test-key
          DJANGO_ALLOWED_HOSTS: localhost
          DJANGO_SETTINGS_MODULE: purplex.settings
          PURPLEX_ENV: development
        run: |
          python manage.py migrate
          echo "Creating test data..."
          python manage.py populate_comprehensive || true

      - name: Test concurrent connections
        env:
          DATABASE_URL: postgresql://purplex_test:testpass@localhost:5432/purplex_test
          DJANGO_SECRET_KEY: test-key
          DJANGO_ALLOWED_HOSTS: localhost
          DJANGO_SETTINGS_MODULE: purplex.settings
          PURPLEX_ENV: development
        run: |
          cat > test_concurrent.py << 'EOF'
          import os
          os.environ['DJANGO_SETTINGS_MODULE'] = 'purplex.settings'
          import django
          django.setup()

          from concurrent.futures import ThreadPoolExecutor
          from django.db import connection
          import time

          def test_connection(i):
              with connection.cursor() as cursor:
                  cursor.execute('SELECT COUNT(*) FROM problems_app_problem')
                  result = cursor.fetchone()
              return i

          # Test 100 concurrent database connections
          start = time.time()
          with ThreadPoolExecutor(max_workers=100) as executor:
              results = list(executor.map(test_connection, range(100)))
          duration = time.time() - start

          print(f'✓ Handled {len(results)} concurrent connections in {duration:.2f}s')
          print(f'✓ Average time per connection: {duration/100*1000:.2f}ms')
          EOF
          python test_concurrent.py
