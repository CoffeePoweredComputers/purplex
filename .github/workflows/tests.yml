name: Purplex Tests

on:
  push:
    branches: [main, master, develop, testing-framework]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
          DJANGO_SETTINGS_MODULE: purplex.settings
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_DEBUG: True
          # Mock Firebase credentials for testing
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/mock-firebase.json
        run: |
          # Create mock Firebase credentials file
          echo '{"type": "service_account", "project_id": "test"}' > /tmp/mock-firebase.json
          
          # Verify environment
          echo "Current directory: $(pwd)"
          echo "Directory contents:"
          ls -la
          echo "Tests directory exists:"
          ls -la tests/ || echo "tests/ directory not found"
          
          # Run tests
          pytest tests/ -v --cov=purplex --cov-report=xml --cov-report=term
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  frontend-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: purplex/client/yarn.lock
      
      - name: Install frontend dependencies
        working-directory: purplex/client
        run: yarn install --frozen-lockfile
      
      - name: Check if tests exist
        id: check_tests
        working-directory: purplex/client
        run: |
          if [ -f "vitest.config.ts" ] && yarn list vitest &>/dev/null; then
            echo "tests_exist=true" >> $GITHUB_OUTPUT
          else
            echo "tests_exist=false" >> $GITHUB_OUTPUT
            echo "Frontend tests not yet configured - skipping"
          fi
      
      - name: Run frontend tests
        if: steps.check_tests.outputs.tests_exist == 'true'
        working-directory: purplex/client
        run: |
          yarn test:unit --coverage
      
      - name: Upload frontend coverage
        if: steps.check_tests.outputs.tests_exist == 'true'
        uses: codecov/codecov-action@v3
        with:
          file: ./purplex/client/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  # Job to check overall test status
  test-status:
    if: always()
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.backend-tests.result }}" == "failure" ]]; then
            echo "Backend tests failed!"
            exit 1
          fi
          echo "All required tests passed!"