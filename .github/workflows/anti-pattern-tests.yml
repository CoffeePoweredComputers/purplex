name: Anti-Pattern Tests

on:
  push:
    branches: [ master, main, postgres ]
  pull_request:
    branches: [ master, main, postgres ]

jobs:
  test-no-backward-compatibility:
    name: Test No Backward Compatibility Module
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check services.py doesn't exist
      run: |
        if [ -f "purplex/problems_app/services.py" ]; then
          echo "ERROR: Backward compatibility module services.py should not exist"
          echo "All imports should use 'from .services.module_name import ClassName'"
          exit 1
        fi
        echo "✓ No backward compatibility module found"
    
    - name: Verify correct import patterns in views
      run: |
        echo "Checking for correct service imports in views..."
        
        # Check that views use proper imports from services directory
        if grep -r "from \.\.services import" purplex/problems_app/views/*.py 2>/dev/null; then
          echo "ERROR: Found imports from services.py backward compatibility module"
          echo "Should use: from ..services.service_name import ServiceClass"
          exit 1
        fi
        
        # Verify correct import pattern is used
        if ! grep -r "from \.\.services\.[a-z_]* import" purplex/problems_app/views/*.py 2>/dev/null; then
          echo "WARNING: No service imports found in views"
        else
          echo "✓ Views use correct service import pattern"
        fi

  test-admin-service-layer:
    name: Test Admin Service Layer
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check AdminProblemService exists
      run: |
        if [ ! -f "purplex/problems_app/services/admin_service.py" ]; then
          echo "ERROR: admin_service.py should exist"
          exit 1
        fi
        echo "✓ admin_service.py exists"
    
    - name: Verify AdminProblemService class exists
      run: |
        if ! grep -q "class AdminProblemService" purplex/problems_app/services/admin_service.py; then
          echo "ERROR: AdminProblemService class not found"
          exit 1
        fi
        echo "✓ AdminProblemService class exists"
    
    - name: Check admin views use AdminProblemService
      run: |
        if ! grep -q "from ..services.admin_service import AdminProblemService" purplex/problems_app/views/admin_views.py; then
          echo "ERROR: admin_views.py should import AdminProblemService"
          exit 1
        fi
        echo "✓ Admin views import AdminProblemService"
    
    - name: Verify no complex business logic in admin views
      run: |
        # Check for transaction.atomic blocks in views (should be in service)
        view_file="purplex/problems_app/views/admin_views.py"
        
        # Count lines in post/put methods (should be minimal)
        if [ -f "$view_file" ]; then
          # Extract post method and count substantial logic lines
          post_lines=$(awk '/def post\(self, request/,/^    def [a-z]/' "$view_file" | wc -l)
          put_lines=$(awk '/def put\(self, request/,/^    def [a-z]/' "$view_file" | wc -l)
          
          if [ "$post_lines" -gt 30 ] || [ "$put_lines" -gt 30 ]; then
            echo "WARNING: Admin view methods seem too complex (post: $post_lines lines, put: $put_lines lines)"
            echo "Complex logic should be in AdminProblemService"
          else
            echo "✓ Admin view methods are appropriately thin"
          fi
        fi

  test-service-separation:
    name: Test Service File Separation
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check service files are properly separated
      run: |
        echo "Checking service file organization..."
        
        # Check that code_execution_service.py is reasonably sized
        if [ -f "purplex/problems_app/services/code_execution_service.py" ]; then
          lines=$(wc -l < "purplex/problems_app/services/code_execution_service.py")
          if [ "$lines" -gt 400 ]; then
            echo "ERROR: code_execution_service.py is too large ($lines lines)"
            echo "Should be split into separate service files"
            exit 1
          fi
          echo "✓ code_execution_service.py is appropriately sized ($lines lines)"
        fi
        
        # Check that separate service files exist
        required_services=(
          "purplex/problems_app/services/ai_generation_service.py"
          "purplex/problems_app/services/validation_service.py"
          "purplex/problems_app/services/segmentation_service.py"
        )
        
        for service in "${required_services[@]}"; do
          if [ ! -f "$service" ]; then
            echo "ERROR: $service should exist as a separate file"
            exit 1
          fi
          echo "✓ $(basename $service) exists"
        done
    
    - name: Verify each service has single responsibility
      run: |
        # Check that each service file contains only one main class
        for service_file in purplex/problems_app/services/*.py; do
          if [ "$(basename $service_file)" == "__init__.py" ]; then
            continue
          fi
          
          class_count=$(grep -c "^class.*Service" "$service_file" || true)
          if [ "$class_count" -gt 1 ]; then
            echo "ERROR: $(basename $service_file) contains $class_count service classes"
            echo "Each file should contain only one service class"
            exit 1
          fi
        done
        echo "✓ Each service file has single responsibility"

  test-pytest-consistency:
    name: Test Pytest Consistency
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check no Django TestCase imports in test files
      run: |
        echo "Checking for Django TestCase usage..."
        
        # Find files that import Django's TestCase
        django_test_files=$(grep -r "from django.test import.*TestCase" tests/ --include="*.py" | cut -d: -f1 | sort -u || true)
        
        if [ ! -z "$django_test_files" ]; then
          echo "ERROR: Found Django TestCase imports in:"
          echo "$django_test_files"
          echo ""
          echo "All tests should use pytest fixtures instead of Django TestCase"
          exit 1
        fi
        
        echo "✓ No Django TestCase imports found"
    
    - name: Verify pytest is used consistently
      run: |
        # Check that test files use pytest
        test_file_count=$(find tests/ -name "test_*.py" | wc -l)
        pytest_import_count=$(grep -r "import pytest" tests/ --include="test_*.py" | wc -l)
        
        if [ "$pytest_import_count" -lt "$test_file_count" ]; then
          echo "WARNING: Not all test files import pytest"
          echo "Test files: $test_file_count, Pytest imports: $pytest_import_count"
        else
          echo "✓ Pytest is used consistently across test files"
        fi
    
    - name: Check for pytest fixtures usage
      run: |
        # Verify fixtures are used instead of setUp/tearDown
        if grep -r "def setUp\|def tearDown" tests/ --include="*.py"; then
          echo "ERROR: Found setUp/tearDown methods - should use pytest fixtures"
          exit 1
        fi
        echo "✓ No setUp/tearDown methods found - using pytest fixtures"