name: E2E Tests

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: [master]
    paths:
      - 'purplex/**'
      - 'tests/**'
      - 'e2e/**'
      - 'requirements.txt'
      - 'playwright.config.ts'
      - 'package.json'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  e2e:
    name: E2E Shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: purplex_test
          POSTGRES_PASSWORD: testpass  # pragma: allowlist secret
          POSTGRES_DB: purplex_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://purplex_test:testpass@localhost:5432/purplex_e2e  # pragma: allowlist secret
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SECRET_KEY: e2e-secret-key  # pragma: allowlist secret
      DJANGO_SETTINGS_MODULE: purplex.settings
      PURPLEX_ENV: development
      USE_MOCK_FIREBASE: true
      USE_MOCK_OPENAI: true
      DISABLE_FILE_LOGGING: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: purplex/client/yarn.lock

      - name: Install frontend dependencies
        working-directory: purplex/client
        run: yarn install --frozen-lockfile

      - name: Install Playwright dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Set up database
        run: |
          python manage.py migrate --noinput
          python manage.py create_test_users
          python manage.py seed_e2e_data

      - name: Start Django server
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          for i in $(seq 1 30); do curl -sf http://localhost:8000/api/health/ && break || sleep 1; done

      - name: Start Vite dev server
        working-directory: purplex/client
        run: |
          yarn dev --host &
          for i in $(seq 1 30); do curl -sf http://localhost:5173/ && break || sleep 1; done

      - name: Run E2E tests (shard ${{ matrix.shard }}/3)
        run: npx playwright test --reporter=list --shard=${{ matrix.shard }}/3

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7
