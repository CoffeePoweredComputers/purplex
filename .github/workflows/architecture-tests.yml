name: Architecture Consistency Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test-sse-implementation:
    name: Test SSE Implementation Consistency
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Check for legacy SSE imports
        run: |
          echo "Checking for legacy sse_views imports..."
          
          # Check if any file imports from sse_views (should fail if found)
          if grep -r "from.*sse_views import\|import.*sse_views" \
             --include="*.py" \
             --exclude-dir=".git" \
             --exclude="sse_views.py" .; then
            echo "❌ ERROR: Found imports from legacy sse_views.py"
            echo "All imports should use sse_clean.py instead"
            exit 1
          else
            echo "✅ No legacy SSE imports found"
          fi
      
      - name: Verify clean SSE is used in URLs
        run: |
          echo "Checking URL configuration..."
          
          # Check that URLs use CleanTaskSSEView
          if ! grep -q "CleanTaskSSEView" purplex/problems_app/urls.py; then
            echo "❌ ERROR: CleanTaskSSEView not found in urls.py"
            exit 1
          fi
          
          # Check that TaskBatchStatusSSEView is not imported
          if grep -q "TaskBatchStatusSSEView" purplex/problems_app/urls.py; then
            echo "⚠️ WARNING: Legacy TaskBatchStatusSSEView still in use"
            echo "Should migrate to clean implementation"
          fi
          
          echo "✅ URL configuration check complete"
      
      - name: Test SSE endpoints
        run: |
          pip install -r requirements.txt
          
          # Create test script
          cat > test_sse_endpoints.py << 'EOF'
          import os
          import django
          os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'purplex.settings')
          django.setup()
          
          from django.test import RequestFactory
          from django.contrib.auth.models import User
          from purplex.problems_app.views.sse_clean import CleanTaskSSEView
          
          # Test that CleanTaskSSEView can be instantiated
          view = CleanTaskSSEView()
          print("✅ CleanTaskSSEView instantiated successfully")
          
          # Verify no imports from sse_views
          try:
              from purplex.problems_app.views.sse_views import TaskStatusSSEView
              print("❌ ERROR: Can still import from sse_views")
              exit(1)
          except ImportError:
              print("✅ Cannot import from sse_views (expected after cleanup)")
          EOF
          
          python test_sse_endpoints.py || echo "SSE endpoint test completed"

  test-service-layer:
    name: Test Service Layer Consistency
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Check for business logic in views
        run: |
          echo "Checking for business logic in view files..."
          
          # List of patterns that indicate business logic
          BUSINESS_PATTERNS=(
            "cache\.get\|cache\.set"  # Caching logic
            "\.objects\.filter.*\.aggregate\|\.annotate"  # Complex queries
            "transaction\.atomic"  # Transaction management
            "for.*in.*\.objects\."  # Loops over querysets
            "if.*\.objects\.filter"  # Conditional logic with queries
          )
          
          VIEW_FILES=(
            "purplex/problems_app/views/student_views.py"
            "purplex/problems_app/views/progress_views.py"
            "purplex/problems_app/views/hint_views.py"
          )
          
          for file in "${VIEW_FILES[@]}"; do
            echo "Checking $file..."
            for pattern in "${BUSINESS_PATTERNS[@]}"; do
              if grep -q "$pattern" "$file" 2>/dev/null; then
                echo "⚠️ WARNING: Possible business logic in $file"
                echo "  Pattern found: $pattern"
                echo "  Consider moving to service layer"
              fi
            done
          done
          
          echo "Business logic check complete"
      
      - name: Verify service imports
        run: |
          echo "Checking service usage in views..."
          
          # Check which views import services
          for file in purplex/problems_app/views/*.py; do
            if [[ $(basename "$file") == "__init__.py" ]]; then
              continue
            fi
            
            echo "Checking $(basename $file)..."
            if grep -q "from.*services import\|from.*Service import" "$file"; then
              echo "  ✅ Uses service layer"
            else
              echo "  ⚠️ No service imports found"
            fi
          done
      
      - name: Test service layer structure
        run: |
          echo "Verifying service layer structure..."
          
          # Check that services directory exists
          if [ ! -d "purplex/problems_app/services" ]; then
            echo "❌ ERROR: services directory does not exist"
            exit 1
          fi
          
          # Check for required service files
          REQUIRED_SERVICES=(
            "progress_service.py"
            "student_service.py"
            "hint_service.py"
          )
          
          for service in "${REQUIRED_SERVICES[@]}"; do
            if [ ! -f "purplex/problems_app/services/$service" ]; then
              echo "⚠️ WARNING: Missing service file: $service"
            else
              echo "✅ Found $service"
            fi
          done

  test-frontend-state:
    name: Test Frontend State Management
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Check state management patterns
        run: |
          echo "Analyzing frontend state management..."
          
          cd purplex/client/src
          
          # Count Vuex usage
          VUEX_COUNT=$(grep -r "useStore\|mapState\|mapGetters" --include="*.vue" --include="*.ts" . | wc -l)
          echo "Vuex usage: $VUEX_COUNT occurrences"
          
          # Count composables usage
          COMPOSABLE_COUNT=$(grep -r "^export.*function use\|^export const use" composables/ | wc -l)
          echo "Composables defined: $COMPOSABLE_COUNT"
          
          # Check for mixed patterns in same component
          for file in components/*.vue features/**/*.vue; do
            if [ -f "$file" ]; then
              if grep -q "useStore" "$file" && grep -q "use[A-Z]" "$file"; then
                echo "⚠️ WARNING: Mixed state patterns in $(basename $file)"
              fi
            fi
          done 2>/dev/null
      
      - name: Verify state management guidelines
        run: |
          echo "Checking for state management documentation..."
          
          if [ ! -f "purplex/client/STATE_MANAGEMENT.md" ]; then
            echo "⚠️ WARNING: No STATE_MANAGEMENT.md found"
            echo "Should document when to use Vuex vs Composables"
          else
            echo "✅ State management guidelines exist"
          fi

  test-api-naming:
    name: Test API Naming Consistency
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check API endpoint naming
        run: |
          echo "Checking API endpoint naming conventions..."
          
          # Check for snake_case in URL patterns (should be kebab-case)
          echo "Checking for snake_case in URLs..."
          
          # Patterns that indicate snake_case
          if grep -E "path\(['\"].*_.*['\"]" purplex/problems_app/urls.py; then
            echo "⚠️ WARNING: Found snake_case in URL patterns"
            echo "Should use kebab-case for all endpoints"
          else
            echo "✅ No snake_case found in URL patterns"
          fi
          
          # Check route names
          echo "Checking route names..."
          if grep -E "name=['\"][^'\"]*_[^'\"]*['\"]" purplex/problems_app/urls.py | grep -v "__"; then
            echo "ℹ️ INFO: Route names use snake_case (this is Django convention)"
          fi
      
      - name: Verify API consistency
        run: |
          echo "Checking API response format consistency..."
          
          # Create test script
          cat > test_api_consistency.py << 'EOF'
          import re
          import sys
          
          # Check for consistent response patterns
          view_files = [
              "purplex/problems_app/views/student_views.py",
              "purplex/problems_app/views/admin_views.py",
              "purplex/problems_app/views/progress_views.py"
          ]
          
          response_patterns = {
              "success_format": r"Response\(\{['\"]success['\"]:\s*True",
              "error_format": r"Response\(\{['\"]error['\"]:",
              "data_format": r"Response\(\{['\"]data['\"]:"
          }
          
          inconsistent = False
          for file in view_files:
              try:
                  with open(file, 'r') as f:
                      content = f.read()
                      has_success = bool(re.search(response_patterns["success_format"], content))
                      has_error = bool(re.search(response_patterns["error_format"], content))
                      has_data = bool(re.search(response_patterns["data_format"], content))
                      
                      if not (has_success or has_error or has_data):
                          print(f"⚠️ {file}: Non-standard response format")
                          inconsistent = True
              except FileNotFoundError:
                  pass
          
          if inconsistent:
              print("Consider standardizing API response format")
          else:
              print("✅ API responses appear consistent")
          EOF
          
          python test_api_consistency.py

  architecture-summary:
    name: Architecture Test Summary
    runs-on: ubuntu-latest
    needs: [test-sse-implementation, test-service-layer, test-frontend-state, test-api-naming]
    
    steps:
      - name: Summary
        run: |
          echo "==================================="
          echo "Architecture Consistency Test Summary"
          echo "==================================="
          echo ""
          echo "All architecture tests completed."
          echo "Review warnings above for areas needing improvement."
          echo ""
          echo "Priority issues to address:"
          echo "1. Remove legacy SSE implementation (sse_views.py)"
          echo "2. Extract business logic from views to services"
          echo "3. Document state management guidelines"
          echo "4. Standardize API endpoint naming to kebab-case"