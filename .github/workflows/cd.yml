name: Continuous Deployment

concurrency:
  group: cd-production
  cancel-in-progress: false

on:
  push:
    tags: [ 'v*' ]
    branches: [ master ]
    paths:
      - 'purplex/**'
      - 'requirements.txt'
      - 'Dockerfile*'
      - 'config/docker/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: coffeepoweredcomputers/purplex

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(cat VERSION)-${GITHUB_SHA::8}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Django image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app:latest
          build-args: |
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Celery uses the same Docker image with a different CMD (see docker-compose.yml)

  deploy-production:
    name: Deploy to Production
    runs-on: [self-hosted, production]
    needs: [build-and-push]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production' || github.ref == 'refs/heads/master'
    environment:
      name: production
      url: https://purplex.org
    steps:
      - name: Create database backup
        run: |
          cd /opt/purplex
          ./bin/backup-database.sh

      - name: Deploy to production
        run: |
          cd /opt/purplex
          git fetch origin master --tags
          git checkout master
          git pull origin master
          docker compose -f config/docker/production.yml pull
          docker compose -f config/docker/production.yml down
          docker compose -f config/docker/production.yml up -d
          docker compose -f config/docker/production.yml exec -T app python manage.py migrate
          docker compose -f config/docker/production.yml exec -T app python manage.py collectstatic --noinput

      - name: Run smoke tests
        run: |
          sleep 30
          curl -f https://purplex.org/health/ || exit 1

      - name: Create release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            VERSION
            CHANGELOG.md
