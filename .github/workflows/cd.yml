name: Continuous Deployment

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: coffeepoweredcomputers/purplex

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(cat VERSION)-${GITHUB_SHA::8}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Django image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Celery uses the same Docker image with a different CMD (see docker-compose.yml)

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/master' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.purplex.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_KEY: ${{ secrets.STAGING_SSH_KEY }}
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          echo "$STAGING_KEY" > deploy_key
          chmod 600 deploy_key
          ssh -i deploy_key -o StrictHostKeyChecking=no $STAGING_USER@$STAGING_HOST << EOF
            cd /opt/purplex
            git pull origin main
            docker-compose -f config/docker/staging.yml pull
            docker-compose -f config/docker/staging.yml down
            docker-compose -f config/docker/staging.yml up -d
            docker-compose -f config/docker/staging.yml exec -T app python manage.py migrate
            docker-compose -f config/docker/staging.yml exec -T app python manage.py collectstatic --noinput
          EOF

      - name: Run smoke tests
        run: |
          sleep 30
          curl -f https://staging.purplex.com/health/ || exit 1

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Staging deployment ${{ needs.build-and-push.outputs.version }} ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://purplex.com
    steps:
      - uses: actions/checkout@v4

      - name: Create database backup
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          echo "$PROD_KEY" > deploy_key
          chmod 600 deploy_key
          ssh -i deploy_key -o StrictHostKeyChecking=no $PROD_USER@$PROD_HOST << EOF
            cd /opt/purplex
            ./bin/backup-database.sh
          EOF

      - name: Deploy to production
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_KEY: ${{ secrets.PROD_SSH_KEY }}
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          ssh -i deploy_key -o StrictHostKeyChecking=no $PROD_USER@$PROD_HOST << EOF
            cd /opt/purplex
            git fetch --tags
            git checkout $VERSION
            docker-compose -f config/docker/production.yml pull
            docker-compose -f config/docker/production.yml down
            docker-compose -f config/docker/production.yml up -d
            docker-compose -f config/docker/production.yml exec -T app python manage.py migrate
            docker-compose -f config/docker/production.yml exec -T app python manage.py collectstatic --noinput
            docker-compose -f config/docker/production.yml exec -T app python manage.py clear_cache
          EOF

      - name: Run smoke tests
        run: |
          sleep 30
          curl -f https://purplex.com/health/ || exit 1

      - name: Create release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            VERSION
            CHANGELOG.md

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production deployment ${{ needs.build-and-push.outputs.version }} ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
