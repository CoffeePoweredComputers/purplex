name: Continuous Deployment

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-production
  cancel-in-progress: false

on:
  push:
    tags: [ 'v*' ]
    branches: [ master ]
    paths:
      - 'purplex/**'
      - '!purplex/**/__tests__/**'
      - '!purplex/**/*.test.ts'
      - '!purplex/**/*.spec.ts'
      - 'requirements.txt'
      - 'Dockerfile*'
      - 'config/docker/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: coffeepoweredcomputers/purplex

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(cat VERSION)-${GITHUB_SHA::8}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Django image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app:latest
          build-args: |
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Celery uses the same Docker image with a different CMD (see docker-compose.yml)

  deploy-production:
    name: Deploy to Production
    runs-on: [self-hosted, production]
    needs: [build-and-push]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production' || github.ref == 'refs/heads/master'
    environment:
      name: production
      url: https://purplex.org
    steps:
      - name: Verify CI passed
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          RESULT=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GH_REPO/actions/workflows/ci.yml/runs?branch=master&per_page=1&status=completed" \
            | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['workflow_runs'][0]['conclusion'] if r['workflow_runs'] else 'none')" \
            2>/dev/null || echo "unknown")
          echo "CI status: $RESULT"
          if [ "$RESULT" != "success" ]; then
            echo "CI has not passed on master (status: $RESULT). Aborting deploy."
            exit 1
          fi

      - name: Record current version
        run: |
          cd /opt/purplex
          git rev-parse HEAD > /tmp/pre-deploy-sha

      - name: Create database backup
        run: |
          cd /opt/purplex
          ./bin/backup-database.sh

      - name: Deploy to production
        run: |
          cd /opt/purplex
          git fetch origin master --tags
          git checkout master
          git pull origin master
          docker compose -f config/docker/production.yml pull
          docker compose -f config/docker/production.yml down
          docker compose -f config/docker/production.yml up -d
          docker compose -f config/docker/production.yml exec -T app python manage.py migrate
          docker compose -f config/docker/production.yml exec -T app python manage.py collectstatic --noinput

      - name: Run smoke tests
        run: |
          for i in $(seq 1 30); do curl -sf https://purplex.org/health/ && exit 0 || sleep 2; done
          echo "Smoke test failed after 60s"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          if [ -f /tmp/pre-deploy-sha ]; then
            echo "Rolling back to $(cat /tmp/pre-deploy-sha)"
            cd /opt/purplex
            git checkout $(cat /tmp/pre-deploy-sha)
            docker compose -f config/docker/production.yml up -d
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            VERSION
            CHANGELOG.md
