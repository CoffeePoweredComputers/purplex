name: Continuous Integration

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  POSTGRES_VERSION: '15'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python linters
        run: |
          pip install ruff
          ruff check purplex/
          ruff format --check purplex/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: purplex/client/yarn.lock

      - name: Install frontend dependencies
        working-directory: purplex/client
        run: yarn install --frozen-lockfile

      - name: Run frontend linters
        working-directory: purplex/client
        run: |
          yarn lint:check
          yarn typecheck
          yarn stylelint:check

      - name: i18n coverage report
        working-directory: purplex/client
        run: yarn i18n:check

  test-unit:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
      fail-fast: false

    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}-alpine
        env:
          POSTGRES_USER: purplex_test
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: purplex_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ matrix.python-version }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov pytest-xdist

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://purplex_test:testpass@localhost:5432/purplex_test
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SECRET_KEY: test-secret-key-ci
          DJANGO_SETTINGS_MODULE: purplex.settings
          PURPLEX_ENV: development
          USE_MOCK_FIREBASE: true
          USE_MOCK_OPENAI: true
          DISABLE_FILE_LOGGING: true
        run: |
          python manage.py migrate --noinput

      - name: Run unit tests with coverage
        env:
          DATABASE_URL: postgresql://purplex_test:testpass@localhost:5432/purplex_test
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SECRET_KEY: test-secret-key-ci
          DJANGO_SETTINGS_MODULE: purplex.settings
          PURPLEX_ENV: development
          USE_MOCK_FIREBASE: true
          USE_MOCK_OPENAI: true
          DISABLE_FILE_LOGGING: true
        run: |
          pytest tests/unit/ \
            -v \
            --cov=purplex \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=30 \
            --tb=short \
            -n auto \
            -k "not test_returns_false_on_firebase_error and not test_consent_immutability and not test_repository_pattern and not test_create_update_methods_are_simple and not test_services_use_repositories and not test_serializers_do_not_use_orm"

      - name: Generate coverage report
        if: matrix.python-version == '3.11'
        run: |
          coverage report --show-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unit-tests
          name: unit-tests-py${{ matrix.python-version }}
          fail_ci_if_error: false

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit

    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}-alpine
        env:
          POSTGRES_USER: purplex_test
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: purplex_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://purplex_test:testpass@localhost:5432/purplex_test
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SECRET_KEY: test-secret-key-ci
          DJANGO_SETTINGS_MODULE: purplex.settings
          PURPLEX_ENV: development
          USE_MOCK_FIREBASE: true
          USE_MOCK_OPENAI: true
          DISABLE_FILE_LOGGING: true
        run: |
          python manage.py migrate --noinput

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://purplex_test:testpass@localhost:5432/purplex_test
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SECRET_KEY: test-secret-key-ci
          DJANGO_SETTINGS_MODULE: purplex.settings
          PURPLEX_ENV: development
          USE_MOCK_FIREBASE: true
          USE_MOCK_OPENAI: true
          DISABLE_FILE_LOGGING: true
        run: |
          pytest tests/integration/ \
            -v \
            --cov=purplex \
            --cov-report=xml \
            --cov-report=term \
            --tb=short \
            -m integration

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: integration-tests
          name: integration-tests
          fail_ci_if_error: false

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: purplex/client/yarn.lock

      - name: Install dependencies
        working-directory: purplex/client
        run: yarn install --frozen-lockfile

      - name: Run tests
        working-directory: purplex/client
        run: yarn test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: purplex/client/coverage
          flags: frontend
          name: frontend-coverage

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Django image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: purplex-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Celery image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.celery
          push: false
          tags: purplex-celery:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, test-frontend]
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "## 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test-unit.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.test-integration.result == 'success' && '✅ Passed' || '⚠️ See Details' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | ${{ needs.test-frontend.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if critical tests failed
        if: needs.test-unit.result != 'success' || needs.test-frontend.result != 'success'
        run: |
          echo "❌ Critical tests failed"
          exit 1

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          pip install bandit pip-audit

      - name: Run Bandit security scan
        run: bandit -r purplex/ -ll

      - name: Check dependencies for vulnerabilities
        run: pip-audit --strict --desc on
