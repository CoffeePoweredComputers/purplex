name: Security Scanning

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
    paths:
      - 'requirements.txt'
      - 'requirements/*.txt'
      - 'purplex/**/*.py'
      - 'purplex/client/package.json'
      - 'purplex/client/package-lock.json'
      - 'Dockerfile*'
      - 'docker/**'

jobs:
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit --strict --desc on

      - name: Check frontend dependencies
        working-directory: purplex/client
        run: |
          npm ci
          npm audit --audit-level=high

  code-scan:
    name: Code Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Bandit (fail on high severity)
        run: |
          pip install bandit
          bandit -r purplex/ -ll -f json -o bandit-report.json || true
          # Check for high severity issues (exit 1 if found)
          bandit -r purplex/ -lll --exit-zero -f txt
          # Fail if HIGH severity found
          if bandit -r purplex/ -lll -q 2>/dev/null | grep -q "High"; then
            echo "::error::High severity security issues found!"
            exit 1
          fi

      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/django p/python p/security-audit

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t purplex-app:scan .
          docker build -f Dockerfile.celery -t purplex-celery:scan .

      - name: Run Trivy on Django image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'purplex-app:scan'
          format: 'sarif'
          output: 'trivy-django.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy on Celery image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'purplex-celery:scan'
          format: 'sarif'
          output: 'trivy-celery.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-django.sarif'

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD