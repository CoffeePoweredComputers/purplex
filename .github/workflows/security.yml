name: Security Scanning

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:
  pull_request:
    paths:
      - 'requirements/*.txt'
      - 'purplex/client/package.json'
      - 'purplex/client/yarn.lock'

jobs:
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python dependencies
        run: |
          pip install safety
          safety check --json

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements/production.txt

      - name: Check frontend dependencies
        working-directory: purplex/client
        run: |
          npm audit --audit-level=moderate

  code-scan:
    name: Code Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r purplex/ -f json -o bandit-report.json

      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t purplex-app:scan .
          docker build -f Dockerfile.celery -t purplex-celery:scan .

      - name: Run Trivy on Django image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'purplex-app:scan'
          format: 'sarif'
          output: 'trivy-django.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy on Celery image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'purplex-celery:scan'
          format: 'sarif'
          output: 'trivy-celery.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-django.sarif'

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD