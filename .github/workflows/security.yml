name: Security Scanning

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'requirements.txt'
      - 'purplex/**/*.py'
      - 'purplex/client/package.json'
      - 'purplex/client/yarn.lock'
      - 'Dockerfile*'
      - '.trivyignore'
      - '.github/workflows/security.yml'
  pull_request:
    branches: [master]
    paths:
      - 'requirements.txt'
      - 'purplex/**/*.py'
      - 'purplex/client/package.json'
      - 'purplex/client/yarn.lock'
      - 'Dockerfile*'

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit --desc on || true

      - name: Check frontend dependencies
        working-directory: purplex/client
        run: |
          yarn install --frozen-lockfile
          yarn audit --groups dependencies --level high || true

  code-scan:
    name: Code Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r purplex/ -ll -x '*/migrations/*' -f json -o bandit-report.json || true
          bandit -r purplex/ -lll -x '*/migrations/*'

      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/django p/python

  container-scan:
    name: Container Security Scan
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t purplex-app:scan .

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'purplex-app:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: 'true'
          trivyignores: '.trivyignore'
          exit-code: '1'

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
