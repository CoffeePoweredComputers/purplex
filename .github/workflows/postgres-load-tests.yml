name: Load Testing

on:
  workflow_dispatch:  # Manual trigger only
  schedule:
    - cron: '0 2 * * 0'  # Weekly at 2 AM Sunday
  pull_request:
    types: [labeled]  # Only when labeled "load-test"

jobs:
  realistic-load-test:
    runs-on: ubuntu-latest
    if: contains(github.event.label.name, 'load-test') || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: purplex_test
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: purplex_test
          POSTGRES_MAX_CONNECTIONS: 100  # Realistic for 2-core runner
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install locust psutil

      - name: Setup test environment
        env:
          DATABASE_URL: postgresql://purplex_test:testpass@localhost:5432/purplex_test
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SECRET_KEY: test-key
          DJANGO_SETTINGS_MODULE: purplex.settings
          PURPLEX_ENV: development
          CONN_MAX_AGE: 60  # Keep connections alive
          USE_MOCK_OPENAI: true
        run: |
          # Run migrations
          python manage.py migrate

          # Create specific test data
          python manage.py shell << 'EOF'
          from purplex.problems_app.models import EiplProblem, TestCase
          from django.contrib.auth import get_user_model

          # Create test problems that tests expect
          problems = [
              {"slug": "two-sum", "title": "Two Sum", "sig": "def two_sum(nums: list, target: int) -> list:", "ref": "def two_sum(nums, target):\n    return []"},
              {"slug": "palindrome-check", "title": "Palindrome Check", "sig": "def is_palindrome(s: str) -> bool:", "ref": "def is_palindrome(s):\n    return s == s[::-1]"},
              {"slug": "fizzbuzz", "title": "FizzBuzz", "sig": "def fizzbuzz(n: int) -> str:", "ref": "def fizzbuzz(n):\n    return str(n)"}
          ]

          for p in problems:
              problem, _ = EiplProblem.objects.get_or_create(
                  slug=p["slug"],
                  defaults={
                      "title": p["title"],
                      "difficulty": "easy",
                      "description": f"Test problem {p['title']}",
                      "function_signature": p["sig"],
                      "reference_solution": p["ref"],
                  }
              )
              TestCase.objects.get_or_create(
                  problem=problem,
                  order=0,
                  defaults={
                      "inputs": ["test"],
                      "expected_output": "test",
                  }
              )

          # Create test users for load testing
          User = get_user_model()
          for i in range(10):
              User.objects.get_or_create(
                  username=f"loadtest_user_{i}",
                  defaults={"email": f"test{i}@example.com"}
              )

          print("Test data created successfully")
          EOF

      - name: Start Django with proper logging
        env:
          DATABASE_URL: postgresql://purplex_test:testpass@localhost:5432/purplex_test
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SECRET_KEY: test-key
          DJANGO_SETTINGS_MODULE: purplex.settings
          PURPLEX_ENV: development
          CONN_MAX_AGE: 60
          USE_MOCK_OPENAI: true
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
        run: |
          # Start server with proper logging
          nohup python manage.py runserver 0.0.0.0:8000 > django.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

          # Wait for server with timeout
          echo "Waiting for server to start..."
          for i in {1..60}; do
            if curl -f http://localhost:8000/api/problems/ 2>/dev/null; then
              echo "Server is ready after $i seconds"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Server failed to start. Last 50 lines of log:"
              tail -50 django.log
              exit 1
            fi
            sleep 1
          done

      - name: Create realistic Locust test
        run: |
          cat > locustfile.py << 'EOF'
          import random
          from locust import HttpUser, task, between, events
          import logging

          # Disable auth for load testing
          class LoadTestUser(HttpUser):
              wait_time = between(1, 3)

              def on_start(self):
                  # Skip auth for load testing
                  self.headers = {"Content-Type": "application/json"}

              @task(40)
              def browse_problems(self):
                  """Simple browsing workflow"""
                  try:
                      response = self.client.get("/api/problems/", headers=self.headers)
                      if response.status_code == 403:  # Auth required
                          response.failure("Auth not properly bypassed")
                  except Exception as e:
                      logging.error(f"Browse failed: {e}")

              @task(30)
              def view_problem_sets(self):
                  self.client.get("/api/problem-sets/", headers=self.headers)

              @task(20)
              def check_specific_problem(self):
                  problem = random.choice(["two-sum", "palindrome-check", "fizzbuzz"])
                  self.client.get(f"/api/problems/{problem}/",
                                 headers=self.headers,
                                 name="/api/problems/[slug]")

              @task(10)
              def submit_eipl(self):
                  """Test unified submission endpoint"""
                  data = {
                      "problem_slug": "two-sum",
                      "raw_input": "This function finds two numbers that add up to target"
                  }
                  self.client.post("/api/submit/",
                                  json=data,
                                  headers=self.headers)

          @events.test_stop.add_listener
          def on_test_stop(environment, **kwargs):
              print(f"\n=== Results ===")
              print(f"Requests: {environment.stats.total.num_requests}")
              print(f"Failures: {environment.stats.total.num_failures}")
              print(f"Median: {environment.stats.total.median_response_time}ms")
              print(f"95%: {environment.stats.total.get_response_time_percentile(0.95)}ms")
          EOF

      - name: Run modest load test (200 users max for GitHub Actions)
        continue-on-error: true
        run: |
          echo "Starting load test with 200 concurrent users..."

          # Run for 2 minutes with gradual ramp-up
          locust -f locustfile.py \
                 --host=http://localhost:8000 \
                 --users=200 \
                 --spawn-rate=5 \
                 --run-time=2m \
                 --headless \
                 --only-summary \
                 --html=report.html \
                 --csv=results

          # Check if server is still alive
          if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Django server crashed during test!"
              echo "Last 100 lines of Django log:"
              tail -100 django.log
              exit 1
          fi

          # Display key metrics
          echo "=== Key Metrics ==="
          if [ -f results_stats.csv ]; then
              head -20 results_stats.csv
          fi

      - name: Analyze performance
        run: |
          python << 'EOF'
          import csv
          import sys

          try:
              with open('results_stats.csv', 'r') as f:
                  reader = csv.DictReader(f)
                  stats = list(reader)

                  # Find aggregate stats
                  for row in stats:
                      if row.get('Name') == 'Aggregated':
                          reqs = int(row.get('Request Count', 0))
                          fails = int(row.get('Failure Count', 0))
                          med = float(row.get('Median Response Time', 0))
                          p95 = float(row.get('95%', 0))

                          print(f"\n=== Performance Analysis ===")
                          print(f"Total Requests: {reqs}")
                          print(f"Failed Requests: {fails} ({fails/reqs*100:.1f}%)")
                          print(f"Median Response: {med}ms")
                          print(f"95th Percentile: {p95}ms")

                          # Relaxed thresholds for GitHub Actions
                          if fails/reqs > 0.05:  # >5% failure rate
                              print("❌ High failure rate detected")
                              sys.exit(1)
                          if p95 > 5000:  # >5 seconds
                              print("⚠️ Response times concerning but acceptable for CI")
                          else:
                              print("✅ Performance acceptable")
                          break
          except FileNotFoundError:
              print("No results file found")
          EOF

      - name: Database connection analysis
        run: |
          PGPASSWORD=testpass psql -h localhost -U purplex_test -d purplex_test -c "
            SELECT state, count(*)
            FROM pg_stat_activity
            WHERE datname = 'purplex_test'
            GROUP BY state;
          "

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results-${{ github.run_id }}
          path: |
            report.html
            results*.csv
            django.log

      - name: Cleanup
        if: always()
        run: |
          if [ ! -z "$SERVER_PID" ]; then
            kill $SERVER_PID || true
          fi
