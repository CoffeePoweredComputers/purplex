# Application configuration for Nginx
# This file is included in the main nginx.conf

# Static files
location /static/ {
    alias /usr/share/nginx/html/static/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# Media files
location /media/ {
    alias /usr/share/nginx/html/media/;
    expires 7d;
    add_header Cache-Control "public";

    # Security for uploaded files
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Disposition "attachment" always;
}

# API endpoints with rate limiting
location /api/ {
    limit_req zone=api burst=20 nodelay;
    limit_conn addr 10;

    proxy_pass http://django;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;

    # Timeouts for long-running API calls
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Disable buffering for SSE endpoints
    location ~ ^/api/tasks/.*/stream/$ {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # SSE specific settings
        proxy_set_header Cache-Control "no-cache";
        proxy_set_header X-Accel-Buffering "no";

        # Extended timeout for SSE
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# Admin interface with stricter rate limiting
location /admin/ {
    limit_req zone=general burst=5 nodelay;
    limit_conn addr 5;

    proxy_pass http://django;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
}

# WebSocket support (if needed in future)
location /ws/ {
    proxy_pass http://django;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}

# Main application
location / {
    limit_req zone=general burst=20 nodelay;

    # Try static files first, then proxy to Django
    try_files $uri @django;
}

# Django fallback
location @django {
    proxy_pass http://django;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;

    # General timeouts
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
}

# Security: Deny access to hidden files
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

# Security: Deny access to Python files
location ~ \.py$ {
    deny all;
}