# Pre-commit hooks for Purplex
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Ruff - replaces black, isort, flake8, pyupgrade
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # Note: mypy is run in CI, not pre-commit, because it needs all project
  # dependencies installed (gevent, celery, etc.) which pre-commit's isolated
  # environment doesn't have. Run locally with: mypy purplex/

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.2
    hooks:
      - id: bandit
        args: ["-ll", "-q"]
        exclude: ^(tests/|.*/migrations/)

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: package-lock.json

  # Django-specific
  - repo: https://github.com/ecugol/pre-commit-hooks-django
    rev: v0.4.0
    hooks:
      - id: check-untracked-migrations
      # Note: check-absent-migrations disabled - enable after creating pending migrations
      # - id: check-absent-migrations

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: |
          (?x)^(
            purplex/client/tsconfig\.json|
            purplex/client/\.eslintrc\.json
          )$
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: check-ast
      - id: debug-statements
      - id: no-commit-to-branch
        args: ['--branch', 'master', '--branch', 'main']

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args: ["--ignore", "DL3008", "--ignore", "DL3013"]

  # Frontend CSS linting
  - repo: local
    hooks:
      - id: stylelint
        name: Stylelint CSS
        entry: npx --prefix purplex/client stylelint --allow-empty-input
        language: system
        files: \.(vue|css)$
        pass_filenames: true

ci:
  skip: [bandit]  # Too slow for every commit; run in CI pipeline instead
