"""
Nginx configuration for Purplex
Optimized for high concurrency and caching
"""

upstream purplex_backend {
    # Load balancing between multiple Gunicorn instances
    least_conn;
    
    server 127.0.0.1:8000 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8001 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8002 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8003 weight=1 max_fails=3 fail_timeout=30s;
    
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=submissions:10m rate=1r/s;

# Cache zones
proxy_cache_path /var/cache/nginx/purplex levels=1:2 keys_zone=purplex_cache:100m max_size=10g inactive=60m use_temp_path=off;

server {
    listen 80;
    server_name purplex.example.com;
    
    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name purplex.example.com;
    
    # SSL configuration
    ssl_certificate /etc/ssl/certs/purplex.crt;
    ssl_certificate_key /etc/ssl/private/purplex.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
    
    # Client body size limit
    client_max_body_size 10M;
    
    # Timeouts
    client_header_timeout 10s;
    client_body_timeout 10s;
    send_timeout 10s;
    
    # Static files with caching
    location /static/ {
        alias /var/www/purplex/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    location /media/ {
        alias /var/www/purplex/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }
    
    # API endpoints with rate limiting
    location /api/ {
        # Apply rate limiting
        limit_req zone=api burst=50 nodelay;
        
        # Specific rate limits for submission endpoints
        location ~* ^/api/(test-solution|submit-solution|eipl-submission)/ {
            limit_req zone=submissions burst=5 nodelay;
            proxy_pass http://purplex_backend;
            include /etc/nginx/proxy_params;
        }
        
        proxy_pass http://purplex_backend;
        include /etc/nginx/proxy_params;
        
        # Cache GET requests
        proxy_cache purplex_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "$scheme$request_method$host$request_uri$http_authorization";
        proxy_cache_valid 200 5m;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        
        # Add cache status header
        add_header X-Cache-Status $upstream_cache_status;
    }
    
    # Admin endpoints (no caching)
    location /api/admin/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://purplex_backend;
        include /etc/nginx/proxy_params;
        proxy_cache off;
    }
    
    # WebSocket support for real-time features
    location /ws/ {
        proxy_pass http://purplex_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
    
    # Frontend app
    location / {
        root /var/www/purplex/client/dist;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public";
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Monitoring endpoint
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}