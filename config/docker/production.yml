# Production deployment compose file
# Used by CD pipeline: docker-compose -f config/docker/production.yml up -d
# COMPOSE_PROJECT_NAME is set via config/docker/.env -> ../../.env
#
# All relative paths are resolved from this file's directory (config/docker/).

services:
  # PostgreSQL Database
  postgres-prod:
    image: postgres:15-alpine
    container_name: purplex_postgres
    env_file:
      - ../../.env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=1GB
      -c effective_cache_size=3GB
      -c maintenance_work_mem=256MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=5242kB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c idle_in_transaction_session_timeout=60000
      -c statement_timeout=0
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - database
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 4G
        reservations:
          cpus: '0.75'
          memory: 2G
    restart: unless-stopped

  # Redis Cache & Message Broker
  redis-prod:
    image: redis:7-alpine
    container_name: purplex_redis
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    env_file:
      - ../../.env.production
    networks:
      - backend
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 2560M
        reservations:
          cpus: '0.1'
          memory: 512M
    restart: unless-stopped

  # Docker-in-Docker for secure code execution
  dind:
    image: docker:24-dind
    privileged: true
    networks:
      - backend
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - dind-storage:/var/lib/docker
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "docker info || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Django Application Server
  app:
    image: ghcr.io/coffeepoweredcomputers/purplex/app:latest
    command: >
      sh -c "cp -r /app/purplex/client/dist/* /srv/frontend/ 2>/dev/null || true &&
             exec gunicorn purplex.wsgi:application --config /app/config/gunicorn/gunicorn.py"
    volumes:
      - ../../staticfiles:/app/staticfiles
      - ../../media:/app/media
      - ../../logs:/app/logs
      - ../../firebase-credentials.json:/app/firebase-credentials.json:ro
      - frontend_dist:/srv/frontend
    networks:
      frontend:
        aliases:
          - web
      backend:
      database:
    env_file:
      - ../../.env.production
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-prod:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-prod:6379/0
      - REDIS_HOST=redis-prod
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DOCKER_HOST=tcp://dind:2375
    depends_on:
      postgres-prod:
        condition: service_healthy
      redis-prod:
        condition: service_healthy
      dind:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.5'
          memory: 3584M
        reservations:
          cpus: '1.5'
          memory: 2G
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    restart: unless-stopped

  # Celery Worker
  celery:
    image: ghcr.io/coffeepoweredcomputers/purplex/app:latest
    command: celery -A purplex.celery_simple worker -l info --pool=gevent --concurrency=${CELERY_WORKERS:-100}
    volumes:
      - ../../media:/app/media
      - ../../logs:/app/logs
      - ../../firebase-credentials.json:/app/firebase-credentials.json:ro
    networks:
      - backend
      - database
    env_file:
      - ../../.env.production
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-prod:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-prod:6379/0
      - REDIS_HOST=redis-prod
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DOCKER_HOST=tcp://dind:2375
    depends_on:
      postgres-prod:
        condition: service_healthy
      redis-prod:
        condition: service_healthy
      dind:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A purplex.celery_simple inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '3.4'
          memory: 4608M
        reservations:
          cpus: '2.0'
          memory: 3G
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    restart: unless-stopped

  # Celery Beat Scheduler
  celery-beat:
    image: ghcr.io/coffeepoweredcomputers/purplex/app:latest
    command: celery -A purplex.celery_simple beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ../../logs:/app/logs
      - ../../firebase-credentials.json:/app/firebase-credentials.json:ro
    networks:
      - backend
      - database
    env_file:
      - ../../.env.production
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-prod:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-prod:6379/0
      - REDIS_HOST=redis-prod
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      postgres-prod:
        condition: service_healthy
      redis-prod:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 128M
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8443:443"
    networks:
      - frontend
    volumes:
      - ../../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../nginx/sites-available:/etc/nginx/sites-available:ro
      - frontend_dist:/usr/share/nginx/html
      - ../../staticfiles:/usr/share/nginx/html/static:ro
      - ../../media:/usr/share/nginx/html/media:ro
      - ../../ssl:/etc/nginx/ssl:ro
      - ../../logs/nginx:/var/log/nginx
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/nginx-health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # Certbot SSL Certificate Renewal
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
      - ../../logs/certbot:/var/log/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet --webroot --webroot-path=/var/www/certbot; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    depends_on:
      - nginx

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  database:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  frontend_dist:
  certbot-etc:
    driver: local
  certbot-www:
    driver: local
  dind-storage:
    driver: local
