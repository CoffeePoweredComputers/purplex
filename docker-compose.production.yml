version: '3.8'

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: purplex_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-available:/etc/nginx/sites-available:ro
      - static_volume:/usr/share/nginx/html/static:ro
      - media_volume:/usr/share/nginx/html/media:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - purplex_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: purplex_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-custom.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - purplex_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: purplex_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - purplex_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Django Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: purplex_web
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        gunicorn purplex.wsgi:application
          --bind 0.0.0.0:8000
          --workers 4
          --threads 2
          --worker-class sync
          --worker-tmp-dir /dev/shm
          --timeout 120
          --graceful-timeout 30
          --max-requests 1000
          --max-requests-jitter 100
          --access-logfile -
          --error-logfile -
      "
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    env_file:
      - .env.production
    environment:
      - PURPLEX_ENV=production
      - DJANGO_SETTINGS_MODULE=purplex.settings.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - purplex_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health/')"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Celery Worker
  celery:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: purplex_celery
    command: celery -A purplex.celery_simple worker -l info --concurrency=4
    volumes:
      - media_volume:/app/media
      - logs_volume:/app/logs
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    env_file:
      - .env.production
    environment:
      - PURPLEX_ENV=production
      - DJANGO_SETTINGS_MODULE=purplex.settings.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - purplex_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # Celery Beat Scheduler
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: purplex_celery_beat
    command: celery -A purplex.celery_simple beat -l info
    env_file:
      - .env.production
    environment:
      - PURPLEX_ENV=production
      - DJANGO_SETTINGS_MODULE=purplex.settings.production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - purplex_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

networks:
  purplex_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  logs_volume:
    driver: local