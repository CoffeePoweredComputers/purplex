services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: purplex_postgres
    environment:
      POSTGRES_DB: purplex_prod
      POSTGRES_USER: purplex_user
      POSTGRES_PASSWORD: devpass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purplex_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: purplex_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Django Web Application
  web:
    build: .
    container_name: purplex_web
    command: >
      sh -c "
        python manage.py migrate &&
        gunicorn purplex.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-4}
      "
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      - ./logs:/app/logs
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://purplex_user:devpass123@postgres:5432/purplex_prod
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery Worker
  celery:
    build: .
    container_name: purplex_celery
    command: celery -A purplex.celery_simple worker -l info --concurrency=${CELERY_WORKERS:-4}
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://purplex_user:devpass123@postgres:5432/purplex_prod
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: